    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="MAONI - Plateforme Présidentielle | Réformes Constitutionnelles RDC" />
    <meta property="og:description" content="Consultation citoyenne pour les réformes constitutionnelles. La voix du peuple congolais." />
    <meta property="og:image" content="%PUBLIC_URL%/images/logo-drc-map.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.maoni.cd/" />
    <meta name="twitter:title" content="MAONI - Réformes Constitutionnelles RDC" />
    <meta name="twitter:description" content="Consultation citoyenne pour les réformes constitutionnelles. La voix du peuple congolais." />
    <meta name="twitter:image" content="%PUBLIC_URL%/images/logo-drc-map.png" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/logo-drc-map.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MAONI" />

    <title>MAONI 🇨🇩 - Plateforme Présidentielle | Consultation Citoyenne RDC</title>

    <!-- Polices Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #EFF6FF 100%);
            min-height: 100vh;
        }

        /* Spinner de chargement minimal */
        .app-loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10000;
        }

        .app-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E2E8F0;
            border-top-color: #0D47A1;
            border-radius: 50%;
            animation: app-spin 0.6s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes app-spin {
            to { transform: rotate(360deg); }
        }

        .app-loading-text {
            color: #0D47A1;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Cache le spinner une fois l'app chargée */
        .app-loaded .app-loading {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-loading">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">MAONI 🇨🇩</div>
    </div>

    <noscript>
        <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0D47A1; color: white; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; font-family: 'Inter', sans-serif; z-index: 10000;">
            <div>
                <img src="%PUBLIC_URL%/images/logo-drc-map.png" alt="MAONI" style="height: 80px; margin-bottom: 1rem;" />
                <h1 style="color: #FFD700;">JavaScript requis</h1>
                <p style="max-width: 400px; margin: 1rem auto;">MAONI nécessite JavaScript pour fonctionner. Veuillez activer JavaScript dans votre navigateur.</p>
                <p style="font-size: 0.8rem; opacity: 0.8;">📱 Composez *123# pour participer sans internet</p>
            </div>
        </div>
    </noscript>

    <div id="root"></div>

    <script>
        // Masquer le spinner quand React est prêt
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.body.classList.add('app-loaded');
            }, 100);
        });
    </script>
</body>
</html>
